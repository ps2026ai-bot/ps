<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>验证码快速查询</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f7; 
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 85%;
            max-width: 350px;
        }
        h2 { margin-top: 0; color: #1c1c1e; font-size: 22px; }
        .input-group { margin: 20px 0; }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d1d6;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #f9f9f9;
            outline: none;
            -webkit-appearance: none; 
        }
        input:focus { border-color: #007aff; background-color: #fff; }
        
        .btn-main {
            width: 100%;
            padding: 14px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        .btn-main:active { opacity: 0.7; }

        .btn-copy {
            background: none;
            border: none;
            color: #007aff;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }
        .tips { font-size: 12px; color: #8e8e93; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>📧 验证码查询</h2>
    <div class="input-group">
        <input type="text" id="emailInput" placeholder="输入邮箱地址" autocomplete="off" autofocus>
    </div>
    
    <button class="btn-main" onclick="handleJump()">立即查询</button>
    <button class="btn-copy" onclick="handleCopy()">复制完整链接</button>

    <div class="tips">
        * 若点击无反应，请使用复制功能<br>
        并在浏览器地址栏粘贴打开
    </div>
</div>

<script>
    function getFullUrl() {
        var email = document.getElementById('emailInput').value.trim();
        if (!email) return null;
        // 👇 密码已经改回 KWkj2025.. 
        return "http://mailws.com/m.php?u=" + email + "&p=KWkj2025..";
    }

    function handleJump() {
        var url = getFullUrl();
        if (!url) {
            alert("请输入邮箱！");
            return;
        }

        var a = document.createElement('a');
        a.href = url;
        a.rel = "noreferrer";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function handleCopy() {
        var url = getFullUrl();
        if (!url) {
            alert("请先输入邮箱再复制！");
            return;
        }

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(url).then(function() {
                alert("链接已复制成功！\n请前往地址栏粘贴并打开。");
            }).catch(fallbackCopyTextToClipboard);
        } else {
            fallbackCopyTextToClipboard(url);
        }
    }

    function fallbackCopyTextToClipboard(text) {
        var textArea = document.createElement("textarea");
        textArea.value = text || getFullUrl();
        
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";

        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();

        try {
            var successful = document.execCommand('copy');
            if(successful) {
                alert("链接已复制成功！\n请前往地址栏粘贴并打开。");
            } else {
                alert("复制失败，请手动拼接链接。");
            }
        } catch (err) {
            alert("复制失败，您的浏览器不支持此功能。");
        }

        document.body.removeChild(textArea);
    }

    // 支持回车键
    document.getElementById("emailInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") handleJump();
    });
</script>

</body>
</html>
